# =============================================================================
# Verify Licenses (monthly)
#
# 비개발자 요약:
#   - 매월 1일 새벽 04:00 UTC (한국시간 1일 오후 1시)에 자동 실행
#   - Book Dash와 GDL의 원천 사이트에서 현재 라이선스를 다시 조회해
#     Supabase의 books 테이블 값과 비교, 변경이 감지되면 GitHub Issue 생성
#   - ★ 절대 DB를 변경하지 않음 (dry-run 모드만 사용). 실제 비활성화는
#     사람이 로그 검토 후 로컬에서 --apply 옵션으로 수동 실행
#   - 수동 실행: Actions 탭 → "Verify Licenses" → "Run workflow"
#
# 관련 문서: ADR-0008 §6 (운영 정책), docs/guidelines/license-rules.md 6.2
# Secrets 의존: NEXT_PUBLIC_SUPABASE_URL, SUPABASE_SECRET_KEY
# =============================================================================

name: Verify Licenses (monthly)

on:
  schedule:
    # 매월 1일 04:00 UTC = 한국시간 1일 1:00 PM
    - cron: '0 4 1 * *'
  workflow_dispatch:
    # 입력 없음 — 본 워크플로는 항상 dry-run으로만 실행 (ADR-0008 §6 정책)

# 권한:
#   - contents: read   → checkout용 (스크립트 가져오기)
#   - issues: write    → gh issue create 권한 (변경 감지 시 이슈 생성)
permissions:
  contents: read
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    # timeout 10분: verify_licenses.py 로컬 실측 4.5초. 두 사이트 fetch 1회씩 +
    # 메모리 비교라 시간 예측 가능. retry 시나리오 포함해도 5분 미만 예상.
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run license verification (dry-run only)
        # 실행 스크립트  : scripts/verify_licenses.py
        # 사용 인자       : 없음 — ★ --apply 절대 안 붙임 (ADR-0008 §6 정책)
        # 환경변수 의존  : NEXT_PUBLIC_SUPABASE_URL, SUPABASE_SECRET_KEY
        # 데이터 흐름    : Book Dash meta.yml + GDL WP REST API 1회씩 fetch
        #                  → DB books의 license 값과 비교
        #                  → 변경 감지·disappeared·조회 실패 4단계 분류
        # 종료 코드 의미 :
        #   0 = 변경 없음        → 후속 step 'check-changes'에서 처리, 워크플로 성공
        #   2 = 변경 감지        → 후속 step에서 gh issue 생성, 워크플로 성공
        #   1 = 치명적 오류      → 후속 step에서 exit 1로 워크플로 실패 처리
        # 출력 캡처      : tee로 /tmp/verify_output.log에 저장하여
        #                  이슈 본문에 첨부 (secret 값은 스크립트가 출력하지 않음)
        id: run-verify
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        # set +e: 비제로 종료 코드를 잡기 위해 자동 실패 비활성화
        # PIPESTATUS[0]: tee로 파이프했을 때 첫 명령(python)의 종료 코드 추출
        # exit_code를 step output으로 노출 → 다음 step에서 분기에 사용
        run: |
          set +e
          python scripts/verify_licenses.py | tee /tmp/verify_output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "==> verify_licenses.py exited with code $EXIT_CODE"

      - name: No changes — workflow ends successfully
        # 종료 코드 0: 변경 감지 없음. 정상. 아무 일도 안 하고 워크플로 성공.
        if: steps.run-verify.outputs.exit_code == '0'
        run: echo "✅ 라이선스 변경 감지 없음 (verify_licenses.py exit=0)"

      - name: Changes detected — create GitHub Issue
        # 종료 코드 2: 변경 감지됨. gh issue create로 알림.
        # "감지"는 정상 동작이므로 워크플로 자체는 성공으로 종료 (이 step 후 자연 종료).
        # 이슈 본문은 verify_licenses.py 출력을 그대로 첨부 — secret 미포함
        # (스크립트가 키 값을 출력하지 않음을 코드로 보장: scripts/verify_licenses.py 참조).
        if: steps.run-verify.outputs.exit_code == '2'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_TITLE="[license-audit] $(date -u +%Y-%m-%d) 라이선스 변경 감지"
          ISSUE_BODY=$(cat <<EOF
          ## 자동 라이선스 감사 알림

          \`verify_licenses.py\`(월 1회 cron, ADR-0008 §6)에서 외부 출처의 라이선스 변경을 감지했습니다.

          ### 운영 정책 (ADR-0008 §6)
          - 본 워크플로는 **dry-run 모드**로만 실행됨 (감지+보고만, DB 미변경)
          - 실제 \`is_active=FALSE\` 또는 \`license\` 컬럼 UPDATE는 사람이 로그 검토 후 로컬에서 수동 실행:
            \`\`\`
            python scripts/verify_licenses.py --apply
            \`\`\`

          ### 스크립트 전체 출력
          \`\`\`
          $(cat /tmp/verify_output.log)
          \`\`\`

          ### 후속 조치 체크리스트
          - [ ] 위 "위험 변경 상세" 목록 검토 (NC/ND 등 화이트리스트 외 라이선스로 변경된 책)
          - [ ] 원천 사이트에서 실제로 라이선스가 변경되었는지 확인 (false positive 제거)
          - [ ] 로컬에서 \`python scripts/verify_licenses.py --apply\` 실행하여 \`is_active=FALSE\` 적용
          - [ ] 적용 결과 확인 후 이 이슈를 닫음

          ### 워크플로 실행 링크
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )
          gh issue create \
            --title "$ISSUE_TITLE" \
            --label "license-audit,automated" \
            --body "$ISSUE_BODY"
          echo "==> Issue 생성 완료. 워크플로는 성공으로 종료."

      - name: Fatal error — fail the workflow
        # 종료 코드 1: 환경변수 누락·원천 사이트 통째 장애 등 치명적 오류.
        # 워크플로를 실패로 처리해서 GitHub의 기본 실패 알림(이메일 등)이 가도록.
        if: steps.run-verify.outputs.exit_code == '1'
        run: |
          echo "❌ verify_licenses.py 치명적 오류 (exit=1)"
          echo "환경변수·원천 사이트 상태를 확인하세요."
          exit 1

      - name: Unexpected exit code — fail the workflow
        # 0/1/2 외 종료 코드는 예상 외 상황. 안전하게 실패 처리.
        if: |
          steps.run-verify.outputs.exit_code != '0' &&
          steps.run-verify.outputs.exit_code != '1' &&
          steps.run-verify.outputs.exit_code != '2'
        run: |
          echo "❓ 예상 외 종료 코드: ${{ steps.run-verify.outputs.exit_code }}"
          exit 1
