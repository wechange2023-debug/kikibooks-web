    padding:10px 14px; font-size:13px; margin-bottom:18px; min-height:40px;
    display:flex; align-items:center; gap:10px; }
  .now b { color:#fbbf24; }
  .card { background:#fff; border:1px solid #e5e7eb; border-radius:12px;

  .meta { color:#6b7280; font-size:12px; margin:2px 0 4px; }

    background:#f9fafb; border-left:3px solid #d1d5db; padding:6px 10px; border-radius:4px; }
  .btns { display:flex; gap:8px; flex-wrap:wrap; }
  button { font:inherit; font-size:13px; cursor:pointer; border:1px solid #d1d5db;
    background:#fff; border-radius:8px; padding:8px 14px; }
  button:hover { background:#f3f4f6; }
  button.cover { border-color:#c7d2fe; background:#eef2ff; color:#3730a3; }
  button.body  { border-color:#bbf7d0; background:#ecfdf5; color:#065f46; }
  button.stop  { border-color:#fecaca; background:#fef2f2; color:#991b1b; }
  button.playing { outline:2px solid #fbbf24; outline-offset:1px; }
  .idx { color:#9ca3af; font-size:12px; font-variant-numeric:tabular-nums; }

const nowEl = document.getElementById('now');
const audio = new Audio();
let queue = [];          // 남은 재생 목록
let curBtn = null;       // 현재 재생 버튼
let curLabel = '';

function setNow(t){ nowEl.innerHTML = t; }
function clearPlaying(){ if(curBtn){ curBtn.classList.remove('playing'); curBtn=null; } }

function stopAll(){
  audio.pause(); audio.removeAttribute('src'); queue=[];
  clearPlaying(); setNow('정지됨.');
}

function playQueue(){
  if(queue.length===0){ clearPlaying(); setNow('재생 완료 — <b>'+curLabel+'</b>'); return; }
  const item = queue.shift();
  audio.src = item.src;
  audio.play().catch(e=>setNow('재생 실패: '+e.message+' (경로: '+item.src+')'));
  setNow('재생 중 — <b>'+curLabel+'</b> '+item.tag);
}

audio.addEventListener('ended', playQueue);

function playCover(b, btn){
  stopAll(); curBtn=btn; btn.classList.add('playing'); curLabel=b.title+' — 표지';
  queue=[{src:b.cover, tag:''}];
  playQueue();
}
function playBody(b, btn){
  stopAll(); curBtn=btn; btn.classList.add('playing'); curLabel=b.title+' — 본문';
  queue = b.pages.map((p,i)=>({src:p, tag:'('+(i+1)+'/'+b.pages.length+')'}));
  playQueue();
}

const list = document.getElementById('list');
BOOKS.forEach(b=>{
  const card=document.createElement('div'); card.className='card';
  const t=document.createElement('div'); t.className='title'; t.textContent=b.title; card.appendChild(t);
  const m=document.createElement('div'); m.className='meta';
  m.textContent = b.slug+'  ·  '+b.note+'  ·  본문 '+b.pages.length+'쪽';
  card.appendChild(m);
  const s=document.createElement('div'); s.className='sent'; s.textContent='표지 낭독: "'+b.cover_sentence+'"'; card.appendChild(s);
  const btns=document.createElement('div'); btns.className='btns';
  const bc=document.createElement('button'); bc.className='cover'; bc.textContent='🔊 표지 재생';
  bc.onclick=()=>playCover(b,bc);
  const bb=document.createElement('button'); bb.className='body'; bb.textContent='📖 본문 재생 ('+b.pages.length+'쪽)';
  bb.onclick=()=>playBody(b,bb);
  btns.appendChild(bc); btns.appendChild(bb); card.appendChild(btns);
  list.appendChild(card);
});

const stop=document.createElement('button'); stop.className='stop'; stop.textContent='⏹ 정지';
stop.style.marginTop='8px'; stop.onclick=stopAll;
document.querySelector('.wrap').appendChild(stop);
